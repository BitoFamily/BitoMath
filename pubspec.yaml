name: bito_math
description: Bito Math — gamified math learning with a real-world reward system for children in Grades 1–3.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Fonts
  google_fonts: ^6.2.1

  # Simple local persistence (Phase 1 only — replaced by Isar in Phase 5)
  shared_preferences: ^2.2.3

  # Audio
  audioplayers: ^6.0.0

  # Character animation (issue #19) — state-machine driven Rive avatars,
  # falls back to static PNGs until real .riv assets exist.
  rive: ^0.13.13

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  fake_async: ^1.3.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/animations/

# Issue #5 — app icon / favicon. Run `dart run flutter_launcher_icons` to
# (re)generate all platform icons from icon_source/. Source images are
# generated by scripts/generate_app_icon.py from the existing Coco cutout
# at assets/images/coco.png (already alpha-transparent, no background
# removal needed).
flutter_launcher_icons:
  android: true
  ios: false # no ios/ directory yet in this project — enable once it's scaffolded
  image_path: "icon_source/coco_icon_flat.png"
  adaptive_icon_background: "#22D3EE"
  adaptive_icon_foreground: "icon_source/coco_icon_foreground.png"
  web:
    generate: true
    image_path: "icon_source/coco_icon_flat.png"
    background_color: "#22D3EE"
    theme_color: "#22D3EE"
