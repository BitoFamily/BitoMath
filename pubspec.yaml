name: bito_math
description: Bito Math — gamified math learning with a real-world reward system for children in Grades 1–3.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Fonts
  google_fonts: ^6.2.1

  # Simple local persistence (Phase 1 only — replaced by Isar in Phase 5)
  shared_preferences: ^2.2.3

  # Audio
  audioplayers: ^6.0.0

  # Character animation (issue #19) — state-machine driven Rive avatars,
  # falls back to static PNGs until real .riv assets exist.
  rive: ^0.13.13

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/animations/
